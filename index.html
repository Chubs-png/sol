<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Sol</title>
    <!-- Google Fonts: Outfit for modern, rounded, premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Custom CSS for micro-animations and global styles -->
    <link rel="stylesheet" href="css/style.css" />
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        /* We define our premium pink color palette here using v4 syntax */
        --color-blue-50: oklch(97% 0.014 254.604);
        --color-blue-100: oklch(93.2% 0.032 255.585);
        --color-blue-200: oklch(89.6% 0.061 255.651);
        --color-blue-300: oklch(85.9% 0.09 255.717);
        --color-blue-400: oklch(82.2% 0.119 255.783);
        --color-blue-500: oklch(78.4% 0.148 255.849);
        --color-blue-600: oklch(74.7% 0.177 255.915);
        --color-blue-700: oklch(70.9% 0.206 255.981);
        --font-outfit: "Outfit", sans-serif;
      }

      body {
        font-family: var(--font-outfit);
        background-color: var(--color-blue-50);
        color: #333333;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body
    class="antialiased min-h-screen flex flex-col items-center relative transition-colors duration-500"
  >
    <!-- Dynamic Video Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[0]">
      <video
        autoplay
        loop
        muted
        playsinline
        class="absolute inset-0 w-full h-full object-cover opacity-70"
      >
        <source src="liveBG/cityscapes.mp4" type="video/mp4" />
      </video>
      <!-- Subtle blue overlay to blend with the theme -->
      <div class="absolute inset-0 bg-blue-100/30 mix-blend-color-burn"></div>
    </div>

    <!-- Entrance Overlay: Browsers block auto-playing audio. The user must interact first. -->
    <div
      id="entrance-overlay"
      class="fixed inset-0 z-50 flex items-center justify-center bg-blue-50 transition-opacity duration-1000"
    >
      <button
        id="enter-btn"
        class="group relative px-8 py-4 bg-white/70 backdrop-blur-md rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.05)] border border-white/50 text-blue-600 font-semibold text-xl tracking-wide overflow-hidden transition-all duration-300 hover:shadow-[0_8px_30px_rgb(37,99,235,0.2)] hover:scale-105 active:scale-95"
      >
        <span class="relative z-10 flex items-center gap-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="currentColor"
            class="text-blue-500 heart-beat"
          >
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            />
          </svg>
          Hiiiii
        </span>
        <div
          class="absolute inset-0 bg-blue-50 scale-x-0 origin-left transition-transform duration-300 ease-out group-hover:scale-x-100 z-0"
        ></div>
      </button>
    </div>

    <!-- Global Audio Player (Hidden by default, plays seamlessly across views) -->
    <audio id="bg-music" loop>
      <source src="music/4AM.mp3" type="audio/mpeg" />
    </audio>

    <!-- Floating Navigation Menu -->
    <nav
      id="main-nav"
      class="fixed bottom-6 inset-x-0 z-40 flex justify-center opacity-0 transform translate-y-10 transition-all duration-1000"
    >
      <div
        class="flex items-center gap-1 sm:gap-2 p-1 sm:p-2 bg-white/70 backdrop-blur-xl rounded-full shadow-[0_8px_32px_rgb(37,99,235,0.15)] border border-white/60 max-w-[95vw] whitespace-nowrap overflow-visible"
      >
        <button
          data-route="home"
          class="nav-btn group relative px-4 sm:px-6 py-2 rounded-full text-xs sm:text-sm font-medium text-gray-500 transition-colors hover:text-blue-600 flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative z-10 sm:w-4 sm:h-4"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="relative z-10 hidden sm:inline">Home</span>
        </button>
        <button
          data-route="gallery"
          class="nav-btn group relative px-4 sm:px-6 py-2 rounded-full text-xs sm:text-sm font-medium text-gray-500 transition-colors hover:text-blue-600 flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative z-10 sm:w-4 sm:h-4"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
          <span class="relative z-10 hidden sm:inline">Gallery</span>
        </button>
        <button
          data-route="interactive"
          class="nav-btn group relative px-4 sm:px-6 py-2 rounded-full text-xs sm:text-sm font-medium text-gray-500 transition-colors hover:text-blue-600 flex items-center gap-2"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="relative z-10 sm:w-4 sm:h-4"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span class="relative z-10 hidden sm:inline">Messages</span>
        </button>

        <div class="w-px h-6 bg-gray-200 mx-1"></div>

        <!-- Audio Controls -->
        <div class="flex items-center gap-2 relative">
          <!-- Custom Music Dropdown -->
          <div class="relative">
            <button id="music-dropdown-btn" class="flex items-center gap-2 bg-blue-50 text-blue-600 font-semibold text-xs sm:text-sm rounded-full px-4 py-2 hover:bg-blue-100 hover:shadow-md transition-all border border-blue-200">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
              <span id="current-song-label" class="hidden sm:inline">4AM</span>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-70"><path d="m6 9 6 6 6-6"/></svg>
            </button>
            <div id="music-dropdown-menu" class="absolute bottom-full mb-3 right-0 bg-white/90 backdrop-blur-xl border border-white/60 rounded-3xl shadow-[0_10px_30px_rgb(37,99,235,0.15)] p-2 w-44 opacity-0 pointer-events-none translate-y-4 transition-all duration-300 flex flex-col gap-1">
              <button class="music-option w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-2xl transition-all font-medium flex items-center justify-between" data-src="music/4AM.mp3" data-label="4AM">
                4AM
                <svg class="w-4 h-4 text-blue-500 opacity-100 transition-opacity" data-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
              <button class="music-option w-full text-left px-4 py-2.5 text-sm text-gray-700 hover:text-blue-600 hover:bg-blue-50 rounded-2xl transition-all font-medium flex items-center justify-between" data-src="music/Dominga.mp3" data-label="Dominga">
                Dominga
                <svg class="w-4 h-4 text-blue-500 opacity-0 transition-opacity" data-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
              </button>
            </div>
          </div>
          <button
            id="audio-toggle"
            class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 transition-transform hover:scale-110 active:scale-95 shrink-0"
            aria-label="Toggle Audio"
          >
            <svg
              id="icon-pause"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
            <svg
              id="icon-play"
              class="hidden translate-x-[2px]"
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
        </div>
      </div>
    </nav>

    <!-- Main Content Container: this is where views are dynamically injected -->
    <main
      id="app-content"
      class="w-full max-w-5xl px-6 py-12 flex-1 flex flex-col z-10 opacity-0 transition-opacity duration-500 ease-in-out"
    >
      <!-- Content loaded from views/*.js goes here... -->
    </main>

    <!-- Load App Logic -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
